<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="test.css" />

  <script src="https://kit.fontawesome.com/e337849d60.js" crossorigin="anonymous"></script>

  <title>Document</title>
</head>



<body>
    <section id="players">

        <h1 id="players-header">Players</h1>
        
        <div id="players-container">
            

            
        </div>

        <button id="add-player-btn">Add Player</button>
    </section>


    <section id="color-game">
        <div class="turns-container">
            <h2><span id="player-turn-name">Bob</span>'s turn</h2>
        </div>

        <h1 id="game-level-header">Level: <span id="game-level">1</span></h1>
        <h1 id="color-target-label">Choose: <span id="color-target">Red</span></h1>
        <div class="game-container">
            <div id="color-circle"></div>
            <button id="game-button">Start</button>
        </div>
    </section>
  
    <div id="game-results">

        <div class="game-results-container">
            <h1>Results</h1>

            <div id="game-results-list">
                


            </div>

            <button id="play-again-btn">Play Again</button>
        </div>
        
    </div>

  <script src="test.js"></script>
</body>
</html>
