<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">

    <title>Chart Test</title>
</head>

<body>

    <div id="input">
        <h1>Enter Equation Here</h1>
        <input id="equationInput" type="text">
        <button id="submitEquation">Graph</button>
        <p id="inputWarning">Only characters besides math operators are X, e, and π. Anything else will throw an error.</p>

        <div class="grid-size-setup">
            <div class="input-w-label">
                <p class="input-label">Grid Size</p>
                <input id="gridSizeInput" type="number" />
            </div>

            <div class="input-w-label">
                <p class="input-label">Grid Step</p>
                <input id="gridStepInput" type="number" />
            </div>
        </div>
    </div>

    <div id="chart">
        
        
    </div>
    
    <script src="main.js"></script>
</body>
</html>
